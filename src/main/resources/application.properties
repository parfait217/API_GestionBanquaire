# ====================== Database Configuration ======================
# Assure-toi que la base de données 'Banque' est créée dans ton MySQL/MariaDB
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/Banque?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====================== JPA / Hibernate ======================
# Hibernate 6+ détecte automatiquement le meilleur dialecte si on ne le force pas
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ====================== Server Configuration ======================
server.port=8081

# ====================== Logging Configuration ======================
logging.level.root=WARN
logging.level.com.example.banque=INFO
logging.level.com.example.banque.services=DEBUG
logging.level.com.example.banque.controlleurs=DEBUG
logging.level.com.example.banque.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ====================== JWT Configuration ======================
# Clé de signature (doit être longue pour l'algorithme HS256/512)
app.jwtSecret=banque_secret_key_super_securisee_2026_gestion_bancaire_application_rest_api
app.jwtExpirationMs=86400000

# ====================== SpringDoc OpenAPI / Swagger ======================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true